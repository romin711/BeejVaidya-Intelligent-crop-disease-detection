<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crop Disease Detection</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container">
      <section class="card">
        <h1>Crop Disease Detection</h1>

        <label for="imageInput" class="label">Upload Leaf Image</label>
        <input id="imageInput" class="input-file" type="file" accept="image/*" />

        <div class="preview-wrap">
          <img id="imagePreview" class="image-preview hidden" alt="Selected preview" />
          <p id="previewPlaceholder" class="preview-placeholder">
            Image preview will appear here
          </p>
        </div>

        <button id="detectBtn" class="btn" type="button">Detect Disease</button>

        <p id="statusMessage" class="status" aria-live="polite"></p>

        <article id="resultCard" class="result-card hidden">
          <h2>Prediction Result</h2>
          <p><strong>Prediction:</strong> <span id="prediction">-</span></p>
          <p><strong>Confidence:</strong> <span id="confidence">-</span></p>
          <p><strong>Confidence Level:</strong> <span id="confidenceLevel">-</span></p>
          <p><strong>Treatment:</strong> <span id="treatment">-</span></p>
          <p><strong>Prevention:</strong> <span id="prevention">-</span></p>
          <p><strong>Explanation:</strong> <span id="explanation">-</span></p>
          <p><strong>Processing Time:</strong> <span id="processingTime">-</span></p>
        </article>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
